<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 빌베 DNA 찾기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#2D7CD2;--gd:#1A5BA8;--gl:#EBF3FC;--gm:#90BEE8;
  --bg:#F7FAF9;--w:#fff;--t:#1a1a1a;--ts:#5a6872;--tm:#9aabb5;--bd:#e2ece9;
  --r:14px;--rs:8px;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem 4rem}
.wrap{width:100%;max-width:480px}
.topbar{display:flex;align-items:center;gap:8px;margin-bottom:2rem}
.logo{width:28px;height:28px;background:var(--g);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px}
.brand{font-size:13px;font-weight:700;color:var(--gd);letter-spacing:-.2px}
.screen{display:none}.screen.on{display:block}

/* intro */
.hero{background:var(--w);border:1px solid var(--bd);border-radius:var(--r);padding:2.5rem 2rem 2rem;text-align:center;margin-bottom:1rem}
.dna-icon{font-size:52px;margin-bottom:1rem;display:block;animation:fl 3s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
h1{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:.6rem}
h1 em{color:var(--g);font-style:normal}
.desc{font-size:14px;color:var(--ts);line-height:1.75;margin-bottom:1.75rem}
.pills{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:1.75rem}
.pill{font-size:12px;color:var(--gd);background:var(--gl);border-radius:20px;padding:4px 12px;font-weight:500}

/* inputs */
.input-card{background:var(--w);border:1px solid var(--bd);border-radius:var(--r);padding:1.25rem 1.5rem;margin-bottom:1rem}
.input-card label{display:block;font-size:13px;font-weight:500;color:var(--ts);margin-bottom:.5rem}
.input-card input,.input-card select{width:100%;border:1.5px solid var(--bd);border-radius:var(--rs);padding:.65rem .85rem;font-size:15px;font-family:inherit;color:var(--t);background:var(--bg);outline:none;transition:border-color .15s;appearance:none;-webkit-appearance:none}
.input-card input:focus,.input-card select:focus{border-color:var(--g);background:#fff}
.input-card input::placeholder{color:var(--tm)}
.select-wrap{position:relative}
.select-wrap::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--tm);pointer-events:none;font-size:13px}
.input-card select{cursor:pointer}
.input-card select option[value=""]{color:var(--tm)}

/* buttons */
.btn{display:block;width:100%;background:var(--g);color:#fff;border:none;border-radius:var(--rs);padding:.82rem;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:-.2px;transition:background .15s,transform .1s;font-family:inherit}
.btn:hover{background:var(--gd)}.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.35;cursor:default}
.btn-ghost{background:transparent;border:1.5px solid var(--bd);color:var(--ts)}
.btn-ghost:hover{border-color:var(--g);color:var(--g);background:transparent}

/* quiz */
.prog-track{height:4px;background:var(--bd);border-radius:2px;margin-bottom:1.5rem;overflow:hidden}
.prog-fill{height:100%;background:var(--g);border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.q-num{font-size:11px;font-weight:700;color:var(--g);letter-spacing:.08em;text-transform:uppercase}
.q-step{font-size:12px;color:var(--tm)}
.q-card{background:var(--w);border:1px solid var(--bd);border-radius:var(--r);padding:1.5rem;margin-bottom:1rem}
.q-text{font-size:17px;font-weight:700;line-height:1.55;letter-spacing:-.3px;margin-bottom:1.25rem}
.opt{display:flex;align-items:flex-start;gap:10px;border:1.5px solid var(--bd);border-radius:var(--rs);padding:.75rem 1rem;margin-bottom:.5rem;cursor:pointer;transition:border-color .15s,background .15s;background:#fff}
.opt:last-child{margin-bottom:0}
.opt:hover{border-color:var(--gm);background:var(--gl)}
.opt.picked{border-color:var(--g);background:var(--gl)}
.opt-k{width:22px;height:22px;border-radius:50%;background:var(--bg);border:1.5px solid var(--bd);font-size:11px;font-weight:700;color:var(--tm);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:background .15s,border-color .15s,color .15s}
.opt.picked .opt-k{background:var(--g);border-color:var(--g);color:#fff}
.opt-b{flex:1}
.opt-t{font-size:14px;line-height:1.55;color:var(--t)}
.opt-v{font-size:11px;color:var(--gd);font-weight:500;margin-top:3px;opacity:0;transition:opacity .15s}
.opt.picked .opt-v{opacity:1}

/* result */
.res-hero{background:var(--w);border:1px solid var(--bd);border-radius:var(--r);padding:2rem 1.5rem 1.75rem;text-align:center;margin-bottom:1rem;position:relative;overflow:hidden}
.res-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--g)}
.res-badge{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-bottom:1rem}
.res-emoji{font-size:52px;display:block;margin-bottom:.75rem}
.res-name{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:.3rem}
.res-tag{font-size:13px;font-weight:500;color:var(--ts);margin-bottom:1rem}
.res-desc{font-size:14px;color:var(--ts);line-height:1.75;text-align:left}
.kw-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:1.25rem}
.kw{font-size:12px;color:var(--gd);background:var(--gl);padding:4px 10px;border-radius:20px;font-weight:500}
.info-card{background:var(--w);border:1px solid var(--bd);border-radius:var(--r);padding:1.25rem 1.5rem;margin-bottom:1rem}
.info-label{font-size:12px;color:var(--tm);font-weight:500;margin-bottom:.35rem}
.info-val{font-size:17px;font-weight:700;color:var(--t)}
.info-sub{font-size:13px;color:var(--ts);margin-top:.4rem;line-height:1.6}
.share-note{background:var(--gl);border-radius:var(--rs);padding:1rem 1.25rem;margin-bottom:1rem;font-size:13px;color:var(--gd);line-height:1.65;font-weight:500}

/* loading */
#s-loading{text-align:center;padding:4rem 0}
.spinner{width:32px;height:32px;border:3px solid var(--bd);border-top-color:var(--g);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 1rem}
@keyframes sp{to{transform:rotate(360deg)}}
.loading-t{font-size:14px;color:var(--ts)}
.footer{text-align:center;font-size:12px;color:var(--tm);padding-top:1.5rem}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="logo">🌿</div>
    <span class="brand">빌리지베이비 · 타운홀 2026</span>
  </div>

  <!-- INTRO -->
  <div id="s-intro" class="screen on">
    <div class="hero">
      <span class="dna-icon">🧬</span>
      <h1>나의 <em>빌베 DNA</em> 찾기</h1>
      <p class="desc">우리가 함께 일하는 방식, Core Value 속에<br>나를 가장 닮은 DNA를 찾아보세요.<br>결과로 오늘의 아이스브레이킹 조가 편성됩니다!</p>
      <div class="pills">
        <span class="pill">⏱ 약 3분</span>
        <span class="pill">📝 5가지 질문</span>
        <span class="pill">🎯 5가지 유형</span>
      </div>
      <button class="btn" onclick="show('s-name')">시작하기 →</button>
    </div>
    <div class="footer">빌리지베이비 MVC 타운홀 · 2026</div>
  </div>

  <!-- NAME + TEAM -->
  <div id="s-name" class="screen">
    <div class="input-card">
      <label for="inp-name">이름 👋</label>
      <input id="inp-name" type="text" placeholder="예) 홍길동" maxlength="10" autocomplete="off" oninput="checkName()">
    </div>
    <div class="input-card">
      <label for="inp-team">소속 팀 🏷️</label>
      <div class="select-wrap">
        <select id="inp-team" onchange="checkName()">
          <option value="">팀을 선택해주세요</option>
          <option value="Product">프로덕트팀</option>
          <option value="Commerce">커머스팀</option>
          <option value="Marketing">마케팅팀</option>
          <option value="Brand">브랜드팀</option>
          <option value="Biz">비즈팀</option>
          <option value="GA">GA팀</option>
        </select>
      </div>
    </div>
    <button class="btn" id="btn-name" onclick="startQuiz()" disabled>다음 →</button>
    <div class="footer" style="margin-top:1.5rem">빌리지베이비 MVC 타운홀 · 2026</div>
  </div>

  <!-- QUIZ -->
  <div id="s-quiz" class="screen">
    <div class="prog-track"><div class="prog-fill" id="prog"></div></div>
    <div class="q-meta">
      <span class="q-num" id="q-num">Q1</span>
      <span class="q-step" id="q-step">1 / 5</span>
    </div>
    <div class="q-card">
      <div class="q-text" id="q-text"></div>
      <div id="opts"></div>
    </div>
    <button class="btn" id="btn-next" disabled onclick="nextQ()">다음 →</button>
  </div>

  <!-- LOADING -->
  <div id="s-loading" class="screen">
    <div class="spinner"></div>
    <p class="loading-t">나의 빌베 DNA 분석 중…</p>
  </div>

  <!-- RESULT -->
  <div id="s-result" class="screen">
    <div class="res-hero" id="r-hero">
      <span class="res-badge" id="r-badge">나의 빌베 DNA</span>
      <span class="res-emoji" id="r-emoji"></span>
      <div class="res-name" id="r-name"></div>
      <div class="res-tag" id="r-tag"></div>
      <div class="res-desc" id="r-desc"></div>
      <div class="kw-row" id="r-kw"></div>
    </div>
    <div class="share-note" id="r-share"></div>
    <div class="info-card">
      <div class="info-label">오늘 대화 주제 💬</div>
      <div class="info-sub" id="r-tip"></div>
    </div>
    <div class="info-card">
      <div class="info-label">빌베 DNA 5가지 유형</div>
      <div id="r-all-types"></div>
    </div>
    <button class="btn btn-ghost" style="margin-top:.5rem" onclick="retry()">↺ 처음부터 다시</button>
    <div class="footer" style="margin-top:1.5rem">빌리지베이비 MVC 타운홀 · 2026</div>
  </div>
</div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbyOEJQE0vsFRusQ14Vw62wuPbplRNpjPBgablnWCh1pTDlxXOx3L3sweNJtIn6ROdj43A/exec';

var Qs = [
  { text:'일하다가 문득 갖고 싶은 초능력은?', opts:[
    {k:'A',t:'엄빠 / 고객의 마음을 읽는 초능력',v:'CC',l:'Customer-centric'},
    {k:'B',t:'내가 배운 것을 실시간 공유하고 / 남이 배운 걸 전달받는 초능력',v:'OT',l:'One Team'},
    {k:'C',t:'남들이 뭘 물어볼지 예측하는 초능력',v:'PR',l:'Proactive'},
    {k:'D',t:'누구보다 빠르게 남들과는 다르게. 스피드 초능력',v:'TT',l:'Today not Tomorrow'},
    {k:'E',t:'언제든 회복하는 회복탄력성 초능력',v:'OI',l:'Own Your Impact'}
  ]},
  { text:'동료들이 나한테 자주 하는 말은?', opts:[
    {k:'A',t:'"혹시 숨겨둔 애긔가 있으신가요..?"',v:'CC',l:'Customer-centric'},
    {k:'B',t:'"너가 저번에 공유해준 거 넘 도움됐어"',v:'OT',l:'One Team'},
    {k:'C',t:'"대박 이걸 어떻게 먼저 생각했어"',v:'PR',l:'Proactive'},
    {k:'D',t:'"벌써 했다니 쫌 짱입니다"',v:'TT',l:'Today not Tomorrow'},
    {k:'E',t:'"힘든 상황에서 웃는 너는 1류다.."',v:'OI',l:'Own Your Impact'}
  ]},
  { text:'회의 결론이 내 생각과 달랐을 때 나는?', opts:[
    {k:'A',t:'엄빠한테 뭐가 더 좋은 건지는 한 번 더 생각해봄',v:'CC',l:'Customer-centric'},
    {k:'B',t:'정해졌으면 뒤도 안 돌아보고 팀 결정에 올인',v:'OT',l:'One Team'},
    {k:'C',t:'이런 부분은 우려된다는 것은 꼭 짚고 넘어가자.',v:'PR',l:'Proactive'},
    {k:'D',t:'일단 가보고 아니면 고치면 되지 뭐~',v:'TT',l:'Today not Tomorrow'},
    {k:'E',t:'팀을 믿고 내 역할을 맡아서 진행해보자.',v:'OI',l:'Own Your Impact'}
  ]},
  { text:'시간이 빠듯할 때 내가 택하는 방식은?', opts:[
    {k:'A',t:'엄빠가 실망할 퀄리티는 그래도 하지 말자',v:'CC',l:'Customer-centric'},
    {k:'B',t:'제 도움 필요하신 분! 내가 뭐 도와주까요!',v:'OT',l:'One Team'},
    {k:'C',t:'제 생각을 먼저 한 번 정리해봤습니다',v:'PR',l:'Proactive'},
    {k:'D',t:'안 하고 후회하지 말고 일단 하자',v:'TT',l:'Today not Tomorrow'},
    {k:'E',t:'무슨 일이 있어도 내 역할은 완수해야징!',v:'OI',l:'Own Your Impact'}
  ]},
  { text:'나에게 가장 신나는 상황은?', opts:[
    {k:'A',t:'엄빠가 이걸 어떻게 쓸지 / 받아들일지 상상할 때',v:'CC',l:'Customer-centric'},
    {k:'B',t:'너도나도 한마음 한뜻으로 묻고 챙길 때',v:'OT',l:'One Team'},
    {k:'C',t:'내 의견을 통해 실질적인 변화들이 만들어질 때',v:'PR',l:'Proactive'},
    {k:'D',t:'답답함 없이 쭉쭉 일이 진행될 때',v:'TT',l:'Today not Tomorrow'},
    {k:'E',t:'힘든 상황을 거쳐도 함께 툴툴 털고 일어날 때',v:'OI',l:'Own Your Impact'}
  ]}
];

var DNA = {
  CC:{name:'Customer Explorer',emoji:'🔍',value:'Customer-centric',bg:'#EBF3FC',tc:'#0E3D7A',
    desc:'엄빠의 불안과 불편에서 언제나 출발하는 사람. 작은 디테일 하나도 고객 입장에서 바라보고, 판단이 어려울 때 답을 고객에게서 찾습니다.',
    kws:['공감','고객 관점','디테일','목소리 경청'],
    tip:'우리 서비스에서 엄빠가 가장 감동받을 순간은 어디일까요?'},
  OT:{name:'Team Builder',emoji:'🤝',value:'One Team',bg:'#E6F1FB',tc:'#0C447C',
    desc:'팀 경계를 허물고 전사 목표를 우선하는 사람. 알게 된 맥락과 노하우를 먼저 공유하며, 가장 든든한 동료이자 연결자입니다.',
    kws:['협업','공유','연결','Team Spirit'],
    tip:'다른 팀과 협업해서 예상보다 잘 됐던 순간이 있었나요?'},
  PR:{name:'Action Driver',emoji:'⚡',value:'Proactive',bg:'#EEEDFE',tc:'#3C3489',
    desc:'누가 시키기 전에 이미 해결책을 들고 오는 사람. 근거 있는 대안과 추천을 먼저 꺼내고, 방향이 정해지면 200% 몰입합니다.',
    kws:['주도성','선제적 행동','대안 제시','몰입'],
    tip:'시키지 않았는데 스스로 먼저 해봐서 잘 됐던 경험을 나눠보세요.'},
  TT:{name:'Speed Runner',emoji:'🚀',value:'Today not Tomorrow',bg:'#FEF3E2',tc:'#633806',
    desc:'오늘 60%가 내일 100%보다 강하다고 믿는 사람. "안되는 이유"보다 "어떻게든 실행할 방법"을 먼저 찾습니다.',
    kws:['실행력','속도','결정력','스타트업 DNA'],
    tip:'60%짜리로 일단 했다가 나중에 더 좋아진 사례가 있나요?'},
  OI:{name:'Impact Maker',emoji:'🌟',value:'Own Your Impact',bg:'#FAECE7',tc:'#993C1D',
    desc:'내 일이 조직과 엄빠에게 어떤 영향을 주는지 스스로 고민하는 사람. 어려운 상황에서도 Stay Cheerful함을 잃지 않습니다.',
    kws:['책임감','긍정 에너지','Stay Cheerful','임팩트'],
    tip:'요즘 가장 자랑하고 싶은 나의 임팩트는 무엇인가요? (작아도 OK!)'}
};

var ORDER = ['CC','OT','PR','TT','OI'];

var userName='', userTeam='', answers=[], curQ=0;

function show(id){ document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('on')}); document.getElementById(id).classList.add('on'); window.scrollTo(0,0); }

function checkName(){
  var n=document.getElementById('inp-name').value.trim();
  var t=document.getElementById('inp-team').value;
  document.getElementById('btn-name').disabled = !(n && t);
}

function startQuiz(){
  userName=document.getElementById('inp-name').value.trim();
  userTeam=document.getElementById('inp-team').value;
  if(!userName||!userTeam) return;
  answers=[]; curQ=0;
  show('s-quiz'); renderQ();
}

function renderQ(){
  var q=Qs[curQ];
  document.getElementById('q-num').textContent='Q'+(curQ+1);
  document.getElementById('q-step').textContent=(curQ+1)+' / '+Qs.length;
  document.getElementById('prog').style.width=(curQ/Qs.length*100)+'%';
  document.getElementById('q-text').textContent=q.text;
  var wrap=document.getElementById('opts'); wrap.innerHTML='';
  q.opts.forEach(function(o){
    var el=document.createElement('div'); el.className='opt';
    el.innerHTML='<div class="opt-k">'+o.k+'</div><div class="opt-b"><div class="opt-t">'+o.t+'</div><div class="opt-v">→ '+o.l+'</div></div>';
    el.addEventListener('click',function(){
      document.querySelectorAll('.opt').forEach(function(x){x.classList.remove('picked')});
      el.classList.add('picked'); answers[curQ]=o.v;
      document.getElementById('btn-next').disabled=false;
    });
    wrap.appendChild(el);
  });
  document.getElementById('btn-next').disabled=true;
  document.getElementById('btn-next').textContent=curQ===Qs.length-1?'결과 보기 →':'다음 →';
}

function nextQ(){
  if(!answers[curQ]) return;
  if(curQ<Qs.length-1){ curQ++; renderQ(); } else { showLoading(); }
}

function tally(){
  var cnt={CC:0,OT:0,PR:0,TT:0,OI:0};
  answers.forEach(function(a){cnt[a]++});
  var top='CC',max=0;
  Object.keys(cnt).forEach(function(k){if(cnt[k]>max){max=cnt[k];top=k;}});
  return top;
}

function showLoading(){ show('s-loading'); setTimeout(function(){ var dna=tally(); renderResult(dna); sendToGAS(userName,userTeam,dna); },1400); }

function renderResult(key){
  var d=DNA[key];
  var badge=document.getElementById('r-badge');
  badge.style.background=d.bg; badge.style.color=d.tc;
  document.getElementById('r-emoji').textContent=d.emoji;
  document.getElementById('r-name').textContent=d.name;
  document.getElementById('r-tag').textContent='Core Value: '+d.value;
  document.getElementById('r-desc').textContent=d.desc;
  var kw=document.getElementById('r-kw'); kw.innerHTML='';
  d.kws.forEach(function(k){var s=document.createElement('span');s.className='kw';s.textContent=k;kw.appendChild(s);});
  document.getElementById('r-share').innerHTML='📣 <strong>'+userName+'</strong>님은 <strong>'+d.emoji+' '+d.name+'</strong>!\n오늘 타운홀에서 같은 이모지를 찾아보세요 😄';
  document.getElementById('r-tip').textContent=d.tip;
  var at=document.getElementById('r-all-types'); at.innerHTML='';
  ORDER.forEach(function(t){
    var dd=DNA[t];
    var row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:10px;padding:.5rem 0;border-bottom:1px solid var(--bd)';
    if(t===ORDER[ORDER.length-1]) row.style.borderBottom='none';
    row.innerHTML='<span style="font-size:18px;width:28px;text-align:center">'+dd.emoji+'</span>'
      +'<div style="flex:1"><div style="font-size:13px;font-weight:700">'+dd.name+'</div>'
      +'<div style="font-size:11px;color:var(--tm)">'+dd.value+'</div></div>'
      +(t===key?'<span style="font-size:11px;font-weight:700;background:var(--g);color:#fff;padding:2px 8px;border-radius:20px">나</span>':'');
    at.appendChild(row);
  });
  show('s-result');
}

function retry(){ answers=[]; curQ=0; document.getElementById('inp-name').value=''; document.getElementById('inp-team').value=''; document.getElementById('btn-name').disabled=true; show('s-intro'); }

function sendToGAS(name,team,dna){
  var params = [
    'action=submit',
    'name='      + encodeURIComponent(name),
    'team='      + encodeURIComponent(team),
    'dna='       + encodeURIComponent(dna),
    'dna_name='  + encodeURIComponent(DNA[dna].name),
    'timestamp=' + encodeURIComponent(new Date().toISOString())
  ].join('&');
  fetch(GAS_URL + '?' + params, { method:'GET' })
    .then(function(r){ return r.text(); })
    .catch(function(){});
}
</script>
