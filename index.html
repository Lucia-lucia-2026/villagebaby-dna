
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.quiz-wrap { max-width: 560px; margin: 0 auto; padding: 1.5rem 1rem; }
.screen { display: none; }
.screen.active { display: block; }
.progress-bar { height: 4px; background: var(--color-border-tertiary); border-radius: 2px; margin-bottom: 1.5rem; }
.progress-fill { height: 100%; border-radius: 2px; background: #1D9E75; transition: width 0.4s ease; }
.q-label { font-size: 12px; color: var(--color-text-secondary); font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 0.5rem; }
.q-text { font-size: 17px; font-weight: 500; color: var(--color-text-primary); line-height: 1.5; margin-bottom: 1.25rem; }
.option-btn { display: flex; align-items: flex-start; gap: 10px; width: 100%; text-align: left; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 0.85rem 1rem; margin-bottom: 0.6rem; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
.option-btn:hover { border-color: #1D9E75; background: #E1F5EE; }
.option-btn.selected { border-color: #1D9E75; background: #E1F5EE; }
.opt-key { font-size: 13px; font-weight: 500; color: #0F6E56; min-width: 20px; margin-top: 1px; }
.opt-text { font-size: 14px; color: var(--color-text-primary); line-height: 1.5; }
.opt-tag { font-size: 11px; color: #0F6E56; font-weight: 500; margin-top: 3px; }
.nav-row { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1.25rem; }
.btn-next { background: #1D9E75; color: #fff; border: none; border-radius: var(--border-radius-md); padding: 0.55rem 1.25rem; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
.btn-next:disabled { opacity: 0.35; cursor: default; }
.intro-header { text-align: center; padding: 1.5rem 0 1rem; }
.intro-icon { font-size: 40px; margin-bottom: 0.75rem; }
.intro-title { font-size: 20px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 0.4rem; }
.intro-sub { font-size: 14px; color: var(--color-text-secondary); line-height: 1.6; }
.intro-meta { display: flex; justify-content: center; gap: 1.5rem; margin: 1rem 0 1.5rem; }
.meta-chip { font-size: 12px; color: var(--color-text-secondary); display: flex; align-items: center; gap: 5px; }
.btn-start { display: block; width: 100%; background: #1D9E75; color: #fff; border: none; border-radius: var(--border-radius-md); padding: 0.75rem; font-size: 15px; font-weight: 500; cursor: pointer; }
.result-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.5rem; margin-bottom: 1rem; }
.dna-badge { display: inline-block; font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: 20px; margin-bottom: 0.75rem; }
.dna-title { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 0.3rem; }
.dna-emoji { font-size: 32px; margin-bottom: 0.5rem; display: block; }
.dna-value { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 0.6rem; }
.dna-desc { font-size: 14px; color: var(--color-text-secondary); line-height: 1.65; }
.keyword-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 1rem; }
.kw { font-size: 12px; padding: 3px 10px; border-radius: 20px; border: 0.5px solid var(--color-border-tertiary); color: var(--color-text-secondary); }
.group-section { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem; margin-top: 1rem; }
.group-label { font-size: 12px; color: var(--color-text-secondary); font-weight: 500; margin-bottom: 0.4rem; }
.group-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
.btn-share { width: 100%; border: 0.5px solid var(--color-border-secondary); background: transparent; border-radius: var(--border-radius-md); padding: 0.6rem; font-size: 14px; cursor: pointer; color: var(--color-text-primary); margin-top: 0.5rem; }
.q-counter { font-size: 12px; color: var(--color-text-secondary); text-align: right; margin-bottom: 0.5rem; }
</style>

<div class="quiz-wrap">

<div id="intro" class="screen active">
  <div class="intro-header">
    <div class="intro-icon">🧬</div>
    <div class="intro-title">나의 빌베 DNA 찾기</div>
    <div class="intro-sub">우리가 함께 일하는 방식, Core Value 속에<br>나를 가장 닮은 DNA를 찾아보세요.</div>
  </div>
  <div class="intro-meta">
    <div class="meta-chip"><i class="ti ti-clock" aria-hidden="true" style="font-size:14px"></i> 약 3분</div>
    <div class="meta-chip"><i class="ti ti-list" aria-hidden="true" style="font-size:14px"></i> 5가지 질문</div>
  </div>
  <button class="btn-start" onclick="startQuiz()">시작하기 →</button>
</div>

<div id="quiz" class="screen">
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
  <div class="q-counter" id="counter">1 / 5</div>
  <div class="q-label" id="q-label">Q1</div>
  <div class="q-text" id="q-text"></div>
  <div id="options"></div>
  <div class="nav-row">
    <button class="btn-next" id="btn-next" disabled onclick="nextQ()">다음 →</button>
  </div>
</div>

<div id="result" class="screen">
  <div class="result-card" id="result-card"></div>
  <button class="btn-share" onclick="restart()"><i class="ti ti-refresh" aria-hidden="true"></i> 다시 해보기</button>
</div>

</div>

<script>
var questions = [
  {
    text: "일할 때 내가 가장 자주 하는 생각은?",
    options: [
      { key: "A", text: "고객은 어떻게 느낄까? 엄빠 입장에서 봐야 해.", tag: "Customer-centric", value: "CC" },
      { key: "B", text: "우리 팀 말고 회사 전체에 도움이 될까?", tag: "One Team", value: "OT" },
      { key: "C", text: "누가 시키기 전에 내가 먼저 찾아보자.", tag: "Proactive", value: "PR" },
      { key: "D", text: "일단 실행해보자, 해보면 알지!", tag: "Today not Tomorrow", value: "TT" },
      { key: "E", text: "결과가 나왔는지 끝까지 확인하고 책임져야지.", tag: "Own Your Impact", value: "OI" }
    ]

  {
    text: "동료가 나에게 가장 많이 해주는 칭찬은?",
    options: [
      { key: "A", text: "항상 고객 관점에서 생각하더라.", tag: "Customer-centric", value: "CC" },
      { key: "B", text: "혼자 해결하기 어려운 일도 팀을 연결해줘서 고마워.", tag: "One Team", value: "OT" },
      { key: "C", text: "시키지 않아도 먼저 나서서 해결하더라.", tag: "Proactive", value: "PR" },
      { key: "D", text: "실행력이 정말 빠르고 추진력 있어.", tag: "Today not Tomorrow", value: "TT" },
      { key: "E", text: "맡은 건 끝까지 책임지는 사람이야.", tag: "Own Your Impact", value: "OI" }
    ]
  },
  {
    text: "회의에서 결정이 내 의견과 다르게 났을 때 나는?",
    options: [
      { key: "A", text: "고객에게 더 좋은 방향인지 다시 한번 확인하고 싶어.", tag: "Customer-centric", value: "CC" },
      { key: "B", text: "팀이 정했으면 나도 함께 최선을 다한다.", tag: "One Team", value: "OT" },
      { key: "C", text: "다음에 더 좋은 대안을 먼저 가져오면 되지.", tag: "Proactive", value: "PR" },
      { key: "D", text: "일단 진행해보자, 해보면서 개선할 수 있어.", tag: "Today not Tomorrow", value: "TT" },
      { key: "E", text: "결과로 증명하면 된다. 묵묵히 실행한다.", tag: "Own Your Impact", value: "OI" }
    ]
  },
  {
    text: "주어진 시간이 부족한 상황에서 나의 선택은?",
    options: [
      { key: "A", text: "조금 더 걸려도 엄빠가 만족할 완성도를 맞춘다.", tag: "Customer-centric", value: "CC" },
      { key: "B", text: "팀원에게 솔직하게 공유하고 함께 해결책을 찾는다.", tag: "One Team", value: "OT" },
      { key: "C", text: "내가 먼저 플랜B를 만들어서 제안한다.", tag: "Proactive", value: "PR" },
      { key: "D", text: "60%라도 먼저 내보내고 개선한다.", tag: "Today not Tomorrow", value: "TT" },
      { key: "E", text: "내 파트만큼은 최선을 다해 책임지고 완수한다.", tag: "Own Your Impact", value: "OI" }
    ]
  },
  {
    text: "나에게 가장 잘 어울리는 빌베 문장은?",
    options: [
      { key: "A", text: "\"이게 엄빠가 원하는 게 맞나?\"", tag: "Customer-centric", value: "CC" },
      { key: "B", text: "\"이런 문제가 있는데 도움을 주실 수 있는 분?\"", tag: "One Team", value: "OT" },
      { key: "C", text: "\"이건 제가 직접 해볼게요.\"", tag: "Proactive", value: "PR" },
      { key: "D", text: "\"해보면 되지!\"", tag: "Today not Tomorrow", value: "TT" },
      { key: "E", text: "\"나는 팀에 이런 기여 중이구나!\"", tag: "Own Your Impact", value: "OI" }
    ]
  }
];

var dnaMap = {
  CC: {
    name: "Customer Explorer",
    emoji: "🔍",
    color: "#E1F5EE",
    textColor: "#085041",
    value: "Customer-centric",
    desc: "엄빠의 불안과 불편에서 언제나 출발하는 사람. 작은 디테일 하나도 고객 입장에서 바라보고, 판단이 어려울 때 답을 고객에게서 찾습니다. '두유노우 베이비빌리?'를 외칠 준비가 언제나 되어 있어요.",
    keywords: ["공감", "고객 관점", "디테일", "목소리 경청"],
    group: "고객 DNA 탐험가"
  },
  OT: {
    name: "Team Builder",
    emoji: "🤝",
    color: "#E6F1FB",
    textColor: "#0C447C",
    value: "One Team",
    desc: "팀 경계를 허물고 전사 목표를 우선하는 사람. 알게 된 맥락과 노하우를 혼자 갖지 않고 먼저 공유하며, '내 일 아니야'를 입에 담지 않습니다. 가장 든든한 동료이자 연결자입니다.",
    keywords: ["협업", "공유", "연결", "Team Spirit"],
    group: "One Team DNA 빌더"
  },
  PR: {
    name: "Action Driver",
    emoji: "⚡",
    color: "#EEEDFE",
    textColor: "#3C3489",
    value: "Proactive",
    desc: "누가 시키기 전에 이미 해결책을 들고 오는 사람. 단순 보고가 아닌 근거 있는 대안과 추천을 먼저 꺼내고, 방향이 정해지면 내 의견과 달라도 200% 몰입합니다.",
    keywords: ["주도성", "선제적 행동", "대안 제시", "몰입"],
    group: "주도성 DNA 드라이버"
  },
  TT: {
    name: "Speed Runner",
    emoji: "🚀",
    color: "#FAEEDA",
    textColor: "#633806",
    value: "Today not Tomorrow",
    desc: "오늘 60%가 내일 100%보다 강하다고 믿는 사람. '안되는 이유'보다 '어떻게든 실행할 방법'을 먼저 찾고, 가장 힘든 순간에도 One more step을 내딛습니다.",
    keywords: ["실행력", "속도", "결정", "스타트업 DNA"],
    group: "실행 DNA 스피드러너"
  },
  OI: {
    name: "Impact Maker",
    emoji: "🌟",
    color: "#FAECE7",
    textColor: "#993C1D",
    value: "Own Your Impact",
    desc: "내 일이 조직과 엄빠에게 어떤 영향을 주는지 스스로 고민하는 사람. 어려운 터널에서도 Stay Cheerful함을 잃지 않으며, 책임감과 긍정 에너지로 팀 전체의 사기를 올립니다.",
    keywords: ["책임감", "긍정 에너지", "Stay Cheerful", "임팩트"],
    group: "임팩트 DNA 메이커"
  }
};

var answers = [];
var currentQ = 0;

function startQuiz() {
  answers = [];
  currentQ = 0;
  showScreen("quiz");
  renderQ();
}

function showScreen(id) {
  var screens = document.querySelectorAll(".screen");
  for (var i = 0; i < screens.length; i++) screens[i].classList.remove("active");
  document.getElementById(id).classList.add("active");
}

function renderQ() {
  var q = questions[currentQ];
  document.getElementById("q-label").textContent = "Q" + (currentQ + 1);
  document.getElementById("q-text").textContent = q.text;
  document.getElementById("counter").textContent = (currentQ + 1) + " / " + questions.length;
  document.getElementById("progress").style.width = (currentQ / questions.length * 100) + "%";
  var opts = document.getElementById("options");
  opts.innerHTML = "";
  for (var i = 0; i < q.options.length; i++) {
    (function(opt) {
      var btn = document.createElement("button");
      btn.className = "option-btn";
      btn.innerHTML = '<span class="opt-key">' + opt.key + '</span><span><div class="opt-text">' + opt.text + '</div><div class="opt-tag">→ ' + opt.tag + '</div></span>';
      btn.onclick = function() {
        var all = document.querySelectorAll(".option-btn");
        for (var j = 0; j < all.length; j++) all[j].classList.remove("selected");
        btn.classList.add("selected");
        answers[currentQ] = opt.value;
        document.getElementById("btn-next").disabled = false;
      };
      opts.appendChild(btn);
    })(q.options[i]);
  }
  document.getElementById("btn-next").disabled = true;
  if (currentQ === questions.length - 1) {
    document.getElementById("btn-next").textContent = "결과 보기 →";
  } else {
    document.getElementById("btn-next").textContent = "다음 →";
  }
}

function nextQ() {
  if (currentQ < questions.length - 1) {
    currentQ++;
    renderQ();
  } else {
    showResult();
  }
}

function showResult() {
  var count = { CC: 0, OT: 0, PR: 0, TT: 0, OI: 0 };
  for (var i = 0; i < answers.length; i++) count[answers[i]]++;
  var top = "CC", topN = 0;
  var keys = Object.keys(count);
  for (var i = 0; i < keys.length; i++) {
    if (count[keys[i]] > topN) { topN = count[keys[i]]; top = keys[i]; }
  }
  var dna = dnaMap[top];
  var kws = dna.keywords.map(function(k) { return '<span class="kw">' + k + '</span>'; }).join("");
  document.getElementById("result-card").innerHTML =
    '<span class="dna-badge" style="background:' + dna.color + ';color:' + dna.textColor + '">나의 빌베 DNA</span>' +
    '<span class="dna-emoji">' + dna.emoji + '</span>' +
    '<div class="dna-title">' + dna.name + '</div>' +
    '<div class="dna-value">Core Value: ' + dna.value + '</div>' +
    '<div class="dna-desc">' + dna.desc + '</div>' +
    '<div class="keyword-row">' + kws + '</div>' +
    '<div class="group-section"><div class="group-label">오늘 같은 조</div><div class="group-title">' + dna.group + '</div></div>';
  document.getElementById("progress").style.width = "100%";
  showScreen("result");
}

function restart() {
  answers = [];
  currentQ = 0;
  showScreen("intro");
}
</script>
