    tip:'오늘 대화 주제: 시키지 않았는데 스스로 먼저 해봐서 잘 됐던 경험은?'
  },
  TT: {
    name:'Speed Runner', emoji:'🚀',
    value:'Today not Tomorrow',
    color:'#FEF3E2', tcolor:'#633806',
    desc:'오늘 60%가 내일 100%보다 강하다고 믿는 사람. "안되는 이유"보다 "어떻게든 실행할 방법"을 먼저 찾고, 가장 힘든 순간에도 One more step을 내딛습니다.',
    kws:['실행력', '속도', '결정력', '스타트업 DNA'],
    group:'Speed Runner 조 🚀',
    tip:'오늘 대화 주제: 60%짜리로 일단 했다가 나중에 더 좋아진 사례는?'
  },
  OI: {
    name:'Impact Maker', emoji:'🌟',
    value:'Own Your Impact',
    color:'#FAECE7', tcolor:'#993C1D',
    desc:'내 일이 조직과 엄빠에게 어떤 영향을 주는지 스스로 고민하는 사람. 어려운 터널에서도 Stay Cheerful함을 잃지 않으며, 책임감과 긍정 에너지로 팀 전체의 사기를 올립니다.',
    kws:['책임감', '긍정 에너지', 'Stay Cheerful', '임팩트'],
    group:'Impact Maker 조 🌟',
    tip:'오늘 대화 주제: 요즘 가장 자랑하고 싶은 나의 임팩트는? (작아도 OK!)'
  }
};
 
var allTypes = ['CC','OT','PR','TT','OI'];
 
// ── STATE ───────────────────────────────────────────
var userName = '';
var answers = [];
var curQ = 0;
 
// ── SCREENS ─────────────────────────────────────────
function show(id) {
  var ss = document.querySelectorAll('.screen');
  for (var i=0; i<ss.length; i++) ss[i].classList.remove('on');
  document.getElementById(id).classList.add('on');
  window.scrollTo(0,0);
}
 
function goName() { show('s-name'); }
 
document.getElementById('name-input').addEventListener('input', function() {
  document.getElementById('btn-name-next').disabled = this.value.trim().length === 0;
});
 
function startQuiz() {
  userName = document.getElementById('name-input').value.trim();
  if (!userName) return;
  answers = [];
  curQ = 0;
  show('s-quiz');
  renderQ();
}
 
// ── QUIZ ────────────────────────────────────────────
function renderQ() {
  var q = Qs[curQ];
  document.getElementById('q-num').textContent = 'Q' + (curQ+1);
  document.getElementById('q-step').textContent = (curQ+1) + ' / ' + Qs.length;
  document.getElementById('prog').style.width = (curQ / Qs.length * 100) + '%';
  document.getElementById('q-text').textContent = q.text;
 
  var wrap = document.getElementById('options-wrap');
  wrap.innerHTML = '';
  q.opts.forEach(function(o) {
    var el = document.createElement('div');
    el.className = 'option';
    el.innerHTML =
      '<div class="opt-key">' + o.k + '</div>' +
      '<div class="opt-body">' +
        '<div class="opt-text">' + o.t + '</div>' +
        '<div class="opt-value">→ ' + o.label + '</div>' +
      '</div>';
    el.addEventListener('click', function() {
      document.querySelectorAll('.option').forEach(function(x){ x.classList.remove('picked'); });
      el.classList.add('picked');
      answers[curQ] = o.v;
      document.getElementById('btn-next').disabled = false;
    });
    wrap.appendChild(el);
  });
 
  var btn = document.getElementById('btn-next');
  btn.disabled = true;
  btn.textContent = curQ === Qs.length-1 ? '결과 보기 →' : '다음 →';
}
 
function nextQ() {
  if (!answers[curQ]) return;
  if (curQ < Qs.length-1) {
    curQ++;
    renderQ();
  } else {
    showLoading();
  }
}
 
// ── RESULT ──────────────────────────────────────────
function tally() {
  var cnt = { CC:0, OT:0, PR:0, TT:0, OI:0 };
  answers.forEach(function(a){ cnt[a]++; });
  var top = 'CC', max = 0;
  Object.keys(cnt).forEach(function(k){ if(cnt[k]>max){ max=cnt[k]; top=k; } });
  return top;
}
 
function showLoading() {
  show('s-loading');
  setTimeout(function() {
    var dna = tally();
    renderResult(dna);
    sendToGAS(userName, dna);
  }, 1400);
}
 
function renderResult(key) {
  var d = DNA[key];
 
  // badge + hero colors
  var badge = document.getElementById('r-badge');
  badge.textContent = '나의 빌베 DNA';
  badge.style.background = d.color;
  badge.style.color = d.tcolor;
 
  document.getElementById('r-emoji').textContent = d.emoji;
  document.getElementById('r-name').textContent = d.name;
  document.getElementById('r-value').textContent = 'Core Value: ' + d.value;
  document.getElementById('r-desc').textContent = d.desc;
 
  var kwRow = document.getElementById('r-kw');
  kwRow.innerHTML = '';
  d.kws.forEach(function(k) {
    var s = document.createElement('span');
    s.className = 'kw';
    s.textContent = k;
    kwRow.appendChild(s);
  });
 
  document.getElementById('r-group').textContent = d.group;
  document.getElementById('r-tip').textContent = d.tip;
 
  // all types list
  var list = document.getElementById('all-types-list');
  list.innerHTML = '';
  allTypes.forEach(function(t) {
    var dd = DNA[t];
    var row = document.createElement('div');
    row.className = 'type-row';
    row.innerHTML =
      '<span class="type-emoji">' + dd.emoji + '</span>' +
      '<div class="type-info">' +
        '<div class="type-name">' + dd.name + '</div>' +
        '<div class="type-cv">' + dd.value + '</div>' +
      '</div>' +
      (t === key ? '<span class="type-mine">나</span>' : '');
    list.appendChild(row);
  });
 
  show('s-result');
}
 
function retry() {
  answers = [];
  curQ = 0;
  document.getElementById('name-input').value = '';
  document.getElementById('btn-name-next').disabled = true;
  show('s-intro');
}
 
// ── GAS SUBMIT ──────────────────────────────────────
function sendToGAS(name, dna) {
  var data = new FormData();
  data.append('name', name);
  data.append('dna', dna);
  data.append('dna_name', DNA[dna].name);
  data.append('timestamp', new Date().toISOString());
  fetch(GAS_URL, { method:'POST', body:data, mode:'no-cors' }).catch(function(){});
}
</script>
